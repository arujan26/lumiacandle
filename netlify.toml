[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# SPA fallback — todas as rotas do React Router voltam pro index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
